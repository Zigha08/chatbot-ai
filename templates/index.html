<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f0f0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 400px; background: white; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); overflow: hidden; }
        .chat-header { background: #075e54; color: white; padding: 15px 20px; font-size: 18px; font-weight: bold; }
        .chat-box { height: 450px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 75%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
        .msg.user { align-self: flex-end; background: #dcf8c6; border-bottom-right-radius: 3px; }
        .msg.bot { align-self: flex-start; background: #f0f0f0; border-bottom-left-radius: 3px; }
        .input-area { display: flex; padding: 10px; gap: 8px; border-top: 1px solid #eee; }
        .input-area input { flex: 1; padding: 10px 14px; border-radius: 25px; border: 1px solid #ddd; font-size: 14px; outline: none; }
        .input-area button { padding: 10px 18px; background: #075e54; color: white; border: none; border-radius: 25px; cursor: pointer; font-size: 14px; }
        .input-area button:hover { background: #128c7e; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">🤖 Chatbot AI</div>
        <div class="chat-box" id="chat-box">
            <div class="msg bot">Halo! Ada yang bisa saya bantu? 😊</div>
        </div>
        <div class="input-area">
            <input type="text" id="input" placeholder="Ketik pesan..." onkeydown="if(event.key==='Enter') kirim()"/>
            <button onclick="kirim()">Kirim</button>
        </div>
    </div>

    <script>
        async function kirim() {
            const input = document.getElementById("input");
            const pesan = input.value.trim();
            if (!pesan) return;
            input.value = "";

            tambahPesan(pesan, "user");

            tambahPesan("Mengetik...", "bot", "typing");

            const res = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ pesan: pesan })
            });

            const data = await res.json();
            document.getElementById("typing").remove();
            tambahPesan(data.balasan, "bot");
        }

        function tambahPesan(teks, dari, id = "") {
            const box = document.getElementById("chat-box");
            const div = document.createElement("div");
            div.className = `msg ${dari}`;
            div.textContent = teks;
            if (id) div.id = id;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
